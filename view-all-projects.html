    <!-- Scroll Navigation Buttons -->
    <div class="scroll-nav-group">
        <button id="scroll-up-btn" class="scroll-nav-btn" aria-label="Scroll up">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 15l-6-6-6 6"/>
            </svg>
        </button>
        <button id="scroll-down-btn" class="scroll-nav-btn" aria-label="Scroll down">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 9l6 6 6-6"/>
            </svg>
        </button>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var upBtn = document.getElementById('scroll-up-btn');
            var downBtn = document.getElementById('scroll-down-btn');
            if (!upBtn || !downBtn) return;
            var sections = Array.from(document.querySelectorAll('section[id]'));
            function findIndex() {
                var mid = window.scrollY + window.innerHeight / 3;
                for (var i = sections.length - 1; i >= 0; i--) {
                    if (sections[i].offsetTop <= mid + 50) return i;
                }
                return 0;
            }
            function update() {
                var atTop = window.scrollY < 100;
                var atBottom = document.documentElement.scrollHeight - window.scrollY - window.innerHeight < 30;
                upBtn.classList.toggle('visible', !atTop);
                downBtn.classList.toggle('visible', !atBottom);
            }
            downBtn.addEventListener('click', function() {
                var idx = findIndex();
                if (idx >= sections.length - 1) {
                    window.scrollTo({ top: document.documentElement.scrollHeight, behavior: 'smooth' });
                } else {
                    sections[idx + 1].scrollIntoView({ behavior: 'smooth' });
                }
            });
            upBtn.addEventListener('click', function() {
                var idx = findIndex();
                if (idx <= 0) {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    sections[Math.max(idx - 1, 0)].scrollIntoView({ behavior: 'smooth' });
                }
            });
            var ticking = false;
            window.addEventListener('scroll', function() {
                if (!ticking) {
                    requestAnimationFrame(function() { update(); ticking = false; });
                    ticking = true;
                }
            });
            update();
            var grid = document.getElementById('projects-grid-full');
            if (grid) {
                var mo = new MutationObserver(function() { update(); });
                mo.observe(grid, { childList: true, subtree: true });
            }
        });
    </script>
